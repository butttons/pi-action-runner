name: 'Pi Action Runner'
description: 'AI-powered GitHub automation -- PR review, inline comments, issues, and discussions'
author: 'butttons'

inputs:
  api_key:
    description: 'API key for the model provider. Preferred over pi_auth -- does not expire.'
    required: false
    default: ''
  pi_auth:
    description: 'Base64-encoded pi auth.json. Fallback if api_key is not set. OAuth tokens may expire.'
    required: false
    default: ''
  pi_model:
    description: 'Model to use (provider/model format)'
    required: false
    default: 'opencode-go/kimi-k2.5'
  use_dora:
    description: 'Enable dora code intelligence (install, index, and use dora commands in review)'
    required: false
    default: 'true'
  dora_version:
    description: 'Dora CLI version (latest or specific tag)'
    required: false
    default: 'latest'
  scip_install:
    description: 'Command to install the SCIP indexer. Set to empty string to skip.'
    required: false
    default: 'bun install -g @sourcegraph/scip-typescript'
  dora_pre_index:
    description: 'Commands to run after dora init but before dora index (e.g. install project deps)'
    required: false
    default: ''
  dora_index_command:
    description: 'Override the dora index command'
    required: false
    default: 'dora index'
  project_lockfile:
    description: 'Path to your project lockfile (e.g. pnpm-lock.yaml, bun.lock). When set, node_modules is cached keyed on this file so dora_pre_index installs are skipped on cache hit.'
    required: false
    default: ''
  system_prompt:
    description: 'Path to a custom system prompt file (relative to repo root). Supports {base_branch} interpolation.'
    required: false
    default: ''
  review_template:
    description: 'Path to a custom review output template file (relative to repo root).'
    required: false
    default: ''
  extra_prompt:
    description: 'Additional instructions to append to review prompt'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: React to trigger
      if: github.event_name == 'issue_comment' && github.event.issue.pull_request
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        gh api \
          --method POST \
          /repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
          -f content='eyes'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        cache: true

    - name: Restore action node_modules cache
      id: cache-action-deps
      uses: actions/cache@v4
      with:
        path: ${{ github.action_path }}/node_modules
        key: pi-action-deps-${{ runner.os }}-${{ hashFiles(format('{0}/bun.lock', github.action_path)) }}

    - name: Install action dependencies
      if: steps.cache-action-deps.outputs.cache-hit != 'true'
      shell: bash
      run: |
        cd ${{ github.action_path }}
        bun install --frozen-lockfile

    - name: Restore dora + scip cache
      if: inputs.use_dora == 'true'
      id: cache-dora
      uses: actions/cache@v4
      with:
        path: ~/.bun
        key: pi-dora-${{ runner.os }}-${{ inputs.dora_version }}-${{ inputs.scip_install }}

    - name: Install dora
      if: inputs.use_dora == 'true' && steps.cache-dora.outputs.cache-hit != 'true'
      shell: bash
      run: |
        if [ "${{ inputs.dora_version }}" = "latest" ]; then
          bun add -g @butttons/dora
        else
          bun add -g @butttons/dora@${{ inputs.dora_version }}
        fi

    - name: Install SCIP indexer
      if: inputs.use_dora == 'true' && inputs.scip_install != '' && steps.cache-dora.outputs.cache-hit != 'true'
      shell: bash
      run: ${{ inputs.scip_install }}

    - name: Verify dora
      if: inputs.use_dora == 'true'
      shell: bash
      run: dora --version

    - name: Setup pi auth
      if: inputs.api_key == '' && inputs.pi_auth != ''
      shell: bash
      run: |
        mkdir -p ~/.pi/agent
        echo "${{ inputs.pi_auth }}" | base64 -d > ~/.pi/agent/auth.json
        chmod 600 ~/.pi/agent/auth.json

    - name: Initialize dora
      if: inputs.use_dora == 'true'
      shell: bash
      run: dora init

    - name: Restore project node_modules cache
      if: inputs.use_dora == 'true' && inputs.project_lockfile != ''
      id: cache-project-deps
      uses: actions/cache@v4
      with:
        path: node_modules
        key: pi-project-deps-${{ runner.os }}-${{ hashFiles(inputs.project_lockfile) }}

    - name: Pre-index setup
      if: inputs.use_dora == 'true' && inputs.dora_pre_index != '' && steps.cache-project-deps.outputs.cache-hit != 'true'
      shell: bash
      run: ${{ inputs.dora_pre_index }}

    - name: Build dora index
      if: inputs.use_dora == 'true'
      shell: bash
      run: |
        ${{ inputs.dora_index_command }}
        dora status

    - name: Run pi
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        INPUT_API_KEY: ${{ inputs.api_key }}
        INPUT_PI_AUTH: ${{ inputs.pi_auth }}
        INPUT_PI_MODEL: ${{ inputs.pi_model }}
        INPUT_USE_DORA: ${{ inputs.use_dora }}
        INPUT_SYSTEM_PROMPT: ${{ inputs.system_prompt }}
        INPUT_REVIEW_TEMPLATE: ${{ inputs.review_template }}
        INPUT_EXTRA_PROMPT: ${{ inputs.extra_prompt }}
        INPUT_ACTION_PATH: ${{ github.action_path }}
      run: bun run ${{ github.action_path }}/src/index.ts
