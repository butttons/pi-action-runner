name: 'Pi Action Runner'
description: 'AI-powered GitHub automation -- PR review, inline comments, issues, and discussions'
author: 'butttons'

inputs:
  api_key:
    description: 'API key for the model provider. Preferred over pi_auth -- does not expire.'
    required: false
    default: ''
  pi_auth:
    description: 'Base64-encoded pi auth.json. Fallback if api_key is not set. OAuth tokens may expire.'
    required: false
    default: ''
  pi_model:
    description: 'Model to use (provider/model format)'
    required: false
    default: 'opencode-go/kimi-k2.5'
  use_dora:
    description: 'Enable dora code intelligence (install, index, and use dora commands in review)'
    required: false
    default: 'true'
  dora_version:
    description: 'Dora CLI version (latest or specific tag)'
    required: false
    default: 'latest'
  scip_install:
    description: 'Command to install the SCIP indexer. Set to empty string to skip.'
    required: false
    default: 'bun install -g @sourcegraph/scip-typescript'
  dora_pre_index:
    description: 'Commands to run after dora init but before dora index (e.g. install project deps)'
    required: false
    default: ''
  dora_index_command:
    description: 'Override the dora index command'
    required: false
    default: 'dora index'
  project_lockfile:
    description: 'Path to your project lockfile (e.g. pnpm-lock.yaml, bun.lock). When set, node_modules is cached keyed on this file so dora_pre_index installs are skipped on cache hit.'
    required: false
    default: ''
  system_prompt:
    description: 'Path to a custom system prompt file (relative to repo root). Supports {base_branch} interpolation.'
    required: false
    default: ''
  review_template:
    description: 'Path to a custom review output template file (relative to repo root).'
    required: false
    default: ''
  extra_prompt:
    description: 'Additional instructions to append to review prompt'
    required: false
    default: ''
  obsidian_vault_repo:
    description: 'GitHub repo containing the Obsidian vault (e.g., owner/repo)'
    required: false
    default: ''
  obsidian_vault_name:
    description: 'Name of the vault for obi --vault flag (defaults to repo name)'
    required: false
    default: ''
  obsidian_token:
    description: 'GitHub token for cloning private vault repo (defaults to GITHUB_TOKEN for public repos)'
    required: false
    default: ''
  obsidian_prompt:
    description: 'Additional instructions for using obsidian/obi CLI'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: React to trigger
      if: github.event_name == 'issue_comment' && github.event.issue.pull_request
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        gh api \
          --method POST \
          /repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
          -f content='eyes'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        no-cache: false

    - name: Hash action lockfile
      id: action-lockfile-hash
      shell: bash
      run: echo "hash=$(sha256sum ${{ github.action_path }}/bun.lock | cut -d' ' -f1)" >> $GITHUB_OUTPUT

    - name: Restore action node_modules cache
      id: cache-action-deps
      uses: actions/cache@v4
      with:
        path: ${{ github.action_path }}/node_modules
        key: pi-action-deps-${{ runner.os }}-${{ steps.action-lockfile-hash.outputs.hash }}

    - name: Install action dependencies
      if: steps.cache-action-deps.outputs.cache-hit != 'true'
      shell: bash
      run: |
        cd ${{ github.action_path }}
        bun install --frozen-lockfile

    - name: Restore dora + scip cache
      if: inputs.use_dora == 'true'
      id: cache-dora
      uses: actions/cache@v4
      with:
        path: ~/.bun
        key: pi-dora-${{ runner.os }}-${{ inputs.dora_version }}-${{ inputs.scip_install }}

    - name: Install dora
      if: inputs.use_dora == 'true' && steps.cache-dora.outputs.cache-hit != 'true'
      shell: bash
      run: |
        if [ "${{ inputs.dora_version }}" = "latest" ]; then
          bun add -g @butttons/dora
        else
          bun add -g @butttons/dora@${{ inputs.dora_version }}
        fi

    - name: Install SCIP indexer
      if: inputs.use_dora == 'true' && inputs.scip_install != '' && steps.cache-dora.outputs.cache-hit != 'true'
      shell: bash
      run: ${{ inputs.scip_install }}

    - name: Verify dora
      if: inputs.use_dora == 'true'
      shell: bash
      run: dora --version

    - name: Setup pi auth
      if: inputs.api_key == '' && inputs.pi_auth != ''
      shell: bash
      run: |
        mkdir -p ~/.pi/agent
        echo "${{ inputs.pi_auth }}" | base64 -d > ~/.pi/agent/auth.json
        chmod 600 ~/.pi/agent/auth.json

    - name: Initialize dora
      if: inputs.use_dora == 'true'
      shell: bash
      run: dora init

    - name: Restore dora index cache
      if: inputs.use_dora == 'true'
      id: cache-dora-index
      uses: actions/cache@v4
      with:
        path: .dora
        key: pi-dora-index-${{ runner.os }}-${{ github.sha }}

    - name: Restore project node_modules cache
      if: inputs.use_dora == 'true' && inputs.project_lockfile != '' && steps.cache-dora-index.outputs.cache-hit != 'true'
      id: cache-project-deps
      uses: actions/cache@v4
      with:
        path: node_modules
        key: pi-project-deps-${{ runner.os }}-${{ hashFiles(inputs.project_lockfile) }}

    - name: Pre-index setup
      if: inputs.use_dora == 'true' && inputs.dora_pre_index != '' && steps.cache-dora-index.outputs.cache-hit != 'true' && steps.cache-project-deps.outputs.cache-hit != 'true'
      shell: bash
      run: ${{ inputs.dora_pre_index }}

    - name: Build dora index
      if: inputs.use_dora == 'true' && steps.cache-dora-index.outputs.cache-hit != 'true'
      shell: bash
      run: |
        ${{ inputs.dora_index_command }}
        dora status

    - name: Get vault commit SHA
      if: inputs.obsidian_vault_repo != ''
      id: vault-sha
      shell: bash
      env:
        VAULT_TOKEN: ${{ inputs.obsidian_token || github.token }}
      run: |
        SHA=$(curl -s -H "Authorization: token $VAULT_TOKEN" \
          "https://api.github.com/repos/${{ inputs.obsidian_vault_repo }}/commits/HEAD" | \
          jq -r '.sha')
        echo "sha=$SHA" >> $GITHUB_OUTPUT
        echo "Vault repo commit: $SHA"

    - name: Parse vault name
      if: inputs.obsidian_vault_repo != ''
      id: vault-name
      shell: bash
      run: |
        if [ -n "${{ inputs.obsidian_vault_name }}" ]; then
          VAULT_NAME="${{ inputs.obsidian_vault_name }}"
        else
          VAULT_NAME=$(echo "${{ inputs.obsidian_vault_repo }}" | cut -d'/' -f2)
        fi
        echo "name=$VAULT_NAME" >> $GITHUB_OUTPUT
        echo "home=$HOME" >> $GITHUB_OUTPUT
        echo "Vault name: $VAULT_NAME"
        echo "Home: $HOME"

    - name: Restore vault cache
      if: inputs.obsidian_vault_repo != ''
      id: cache-vault
      uses: actions/cache@v4
      with:
        path: ${{ steps.vault-name.outputs.home }}/obi-vaults/${{ steps.vault-name.outputs.name }}
        key: pi-vault-${{ runner.os }}-${{ inputs.obsidian_vault_repo }}-${{ steps.vault-sha.outputs.sha }}

    - name: Clone Obsidian vault
      if: inputs.obsidian_vault_repo != '' && steps.cache-vault.outputs.cache-hit != 'true'
      shell: bash
      env:
        VAULT_TOKEN: ${{ inputs.obsidian_token || github.token }}
        VAULT_NAME: ${{ steps.vault-name.outputs.name }}
        OBI_HOME: ${{ steps.vault-name.outputs.home }}
      run: |
        mkdir -p $OBI_HOME/obi-vaults
        git clone --depth 1 "https://$VAULT_TOKEN@github.com/${{ inputs.obsidian_vault_repo }}.git" $OBI_HOME/obi-vaults/${VAULT_NAME}
        echo "Vault cloned to: $OBI_HOME/obi-vaults/${VAULT_NAME}"

    - name: Install obi
      if: inputs.obsidian_vault_repo != ''
      shell: bash
      run: bun add -g @butttons/obi

    - name: Verify obi
      if: inputs.obsidian_vault_repo != ''
      shell: bash
      env:
        OBI_VAULTS_PATH: ${{ steps.vault-name.outputs.home }}/obi-vaults
        VAULT_NAME: ${{ steps.vault-name.outputs.name }}
      run: |
        obi vaults
        obi map --vault "$VAULT_NAME"

    - name: Run pi
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        INPUT_API_KEY: ${{ inputs.api_key }}
        INPUT_PI_AUTH: ${{ inputs.pi_auth }}
        INPUT_PI_MODEL: ${{ inputs.pi_model }}
        INPUT_USE_DORA: ${{ inputs.use_dora }}
        INPUT_SYSTEM_PROMPT: ${{ inputs.system_prompt }}
        INPUT_REVIEW_TEMPLATE: ${{ inputs.review_template }}
        INPUT_EXTRA_PROMPT: ${{ inputs.extra_prompt }}
        INPUT_ACTION_PATH: ${{ github.action_path }}
        INPUT_OBSIDIAN_VAULT_NAME: ${{ steps.vault-name.outputs.name }}
        INPUT_OBSIDIAN_PROMPT: ${{ inputs.obsidian_prompt }}
        OBI_VAULTS_PATH: ${{ steps.vault-name.outputs.home }}/obi-vaults
      run: bun run ${{ github.action_path }}/src/index.ts
